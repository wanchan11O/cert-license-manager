{% extends "base.html" %}
{% block content %}
<div class="card">
  <h1>ログイン</h1>
  {% if error %}<p class="error">{{ error }}</p>{% endif %}
  <form method="post" action="/login">
    <div class="field">
      <label>メールアドレス</label>
      <input type="email" name="email" required autofocus>
    </div>
    <div class="field">
      <label>パスワード</label>
      <input type="password" name="password" required>
    </div>
    <button type="submit">ログイン</button>
  </form>
  <p class="mt">アカウントをお持ちでない方は <a href="/register">新規登録</a></p>
</div>
{% endblock %}
